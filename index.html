<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi d'entraînement de course</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Intégration de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        .time-diff.behind { color: red; }
        .time-diff.ahead { color: green; }
        .fade-out { opacity: 0; transition: opacity 0.5s; }
        .hide { display: none; }
        #map { height: 500px; width: 100%; }
        .btn { padding: 8px 16px; margin: 4px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Suivi d'entraînement de course</h1>

    <div class="controls-container">
        <div id="gpxImportContainer">
            <input type="file" id="gpxFile" accept=".gpx" />
        </div>
        <div class="button-group">
            <button id="toggleTraining" class="btn btn-primary" disabled>Démarrer l'entraînement</button>
            <button id="nextWaypoint" class="btn btn-secondary" disabled>Passer au waypoint suivant</button>
        </div>
    </div>

    <div id="status">Charge un fichier GPX pour commencer.</div>

    <div id="positionInfo">
        <strong>Position actuelle :</strong> Non disponible<br>
        <strong>Prochain waypoint :</strong> Aucun<br>
        <strong>Distance restante :</strong> - m
    </div>

    <div id="waypointInfo">Aucun waypoint chargé.</div>

    <div id="history">
        <h3>Historique des waypoints</h3>
        <p>Aucun waypoint atteint pour l'instant.</p>
    </div>

    <!-- Conteneur de la carte -->
    <div id="map"></div>

    <script>
        // Variables globales
        let watchId;
        let allWaypoints = [];
        let measuredWaypoints = [];
        let currentWaypointIndex = 0;
        let startTime = null;
        let map, userMarker, trackLine, waypointMarkers = [];
        let waypointHistory = [];
        let isRaceStarted = false;
        let isTrainingStarted = false;

        // Initialisation de la carte (Leaflet)
        function initMap() {
            map = L.map('map').setView([46.5, 6.6], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        // Charger le fichier GPX
        document.getElementById('gpxFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const gpxData = e.target.result;
                const parsed = parseGPX(gpxData);
                allWaypoints = parsed.allWaypoints;
                measuredWaypoints = parsed.measuredWaypoints;

                if (measuredWaypoints.length > 0) {
                    document.getElementById('status').textContent =
                        `Fichier GPX chargé : ${measuredWaypoints.length} waypoints à mesurer.`;
                    document.getElementById('toggleTraining').disabled = false;

                    // Animation de disparition du bouton d'import
                    const importContainer = document.getElementById('gpxImportContainer');
                    importContainer.classList.add('fade-out');
                    setTimeout(() => {
                        importContainer.classList.add('hide');
                    }, 500);

                    displayWaypointInfo();
                    plotTrackOnMap();
                    waypointHistory = [];
                    updateHistoryDisplay();
                } else {
                    document.getElementById('status').textContent =
                        "Aucun waypoint avec timeOffset trouvé dans le fichier GPX.";
                }
            };
            reader.readAsText(file);
        });

        // Parser le fichier GPX
        function parseGPX(gpxData) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(gpxData, "text/xml");
            const wpts = xmlDoc.getElementsByTagName("wpt");
            const allWaypoints = [];
            const measuredWaypoints = [];

            for (let i = 0; i < wpts.length; i++) {
                const wpt = wpts[i];
                const lat = parseFloat(wpt.getAttribute("lat"));
                const lon = parseFloat(wpt.getAttribute("lon"));
                const name = wpt.getElementsByTagName("name")[0]?.textContent || `Point ${i+1}`;

                if (isNaN(lat) || isNaN(lon)) continue;

                allWaypoints.push({ lat, lon, name });

                let timeOffset = 0;
                const extensions = wpt.getElementsByTagName("extensions")[0];
                if (extensions) {
                    const timeOffsetElement = extensions.getElementsByTagName("timeOffset")[0];
                    if (timeOffsetElement) {
                        timeOffset = parseTimeOffset(timeOffsetElement.textContent);
                        measuredWaypoints.push({ lat, lon, name, timeOffset });
                    }
                }
            }
            return { allWaypoints, measuredWaypoints };
        }

        // Convertir "hh:mm:ss" en secondes
        function parseTimeOffset(timeStr) {
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            return parseInt(timeStr) || 0;
        }

        // Formater les secondes en "hh:mm:ss"
        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Afficher les infos du waypoint actuel
        function displayWaypointInfo() {
            if (currentWaypointIndex >= measuredWaypoints.length) {
                document.getElementById('waypointInfo').textContent = "Tous les waypoints ont été atteints !";
                return;
            }
            const waypoint = measuredWaypoints[currentWaypointIndex];
            document.getElementById('waypointInfo').innerHTML = `
                <strong>Waypoint actuel :</strong> ${waypoint.name}<br>
                <strong>Position :</strong> ${waypoint.lat.toFixed(6)}, ${waypoint.lon.toFixed(6)}<br>
                <strong>Temps de référence :</strong> ${formatTime(waypoint.timeOffset)}
            `;
        }

        // Tracer le tracé et les waypoints sur la carte
        function plotTrackOnMap() {
            if (trackLine) map.removeLayer(trackLine);
            waypointMarkers.forEach(marker => map.removeLayer(marker));
            waypointMarkers = [];

            const trackCoordinates = allWaypoints.map(wpt => [wpt.lat, wpt.lon]);

            if (trackCoordinates.length > 1) {
                trackLine = L.polyline(trackCoordinates, {
                    color: 'blue',
                    weight: 3,
                    opacity: 0.7
                }).addTo(map);
                map.fitBounds(trackLine.getBounds());
            } else if (trackCoordinates.length === 1) {
                map.setView(trackCoordinates[0], 15);
            }

            measuredWaypoints.forEach((wpt, index) => {
                let markerText, markerColor;
                if (index === 0) {
                    markerText = "D";
                    markerColor = "green";
                } else if (index === measuredWaypoints.length - 1) {
                    markerText = "A";
                    markerColor = "red";
                } else {
                    markerText = index;
                    markerColor = index === currentWaypointIndex ? 'red' :
                                 (index < currentWaypointIndex ? 'gray' : 'blue');
                }

                const marker = L.marker([wpt.lat, wpt.lon], {
                    title: wpt.name,
                    icon: L.divIcon({
                        className: 'waypoint-marker',
                        html: `
                            <div style="
                                background-color: ${markerColor};
                                color: white; border-radius: 50%; width: 24px; height: 24px;
                                display: flex; align-items: center; justify-content: center;
                                font-weight: bold;
                            ">${markerText}</div>
                        `
                    })
                }).addTo(map);
                waypointMarkers.push(marker);
            });
        }

        // Gérer le bouton Démarrer/Arrêter l'entraînement
        document.getElementById('toggleTraining').addEventListener('click', function() {
            if (measuredWaypoints.length === 0) {
                alert("Aucun waypoint avec timeOffset chargé !");
                return;
            }

            if (!isTrainingStarted) {
                // Démarrer l'entraînement
                document.getElementById('status').textContent = "En attente du départ (approchez-vous du premier waypoint)...";
                this.textContent = "Arrêter l'entraînement";
                this.classList.remove('btn-primary');
                this.classList.add('btn-danger');
                document.getElementById('nextWaypoint').disabled = false;
                waypointHistory = [];
                updateHistoryDisplay();
                isTrainingStarted = true;
                startTime = null;
                currentWaypointIndex = 0;
                displayWaypointInfo();

                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(
                        updatePosition,
                        handleGeolocationError,
                        { enableHighAccuracy: true, maximumAge: 0, timeout: 3000 }
                    );
                } else {
                    document.getElementById('status').textContent = "La géolocalisation n'est pas supportée par ce navigateur.";
                }
            } else {
                // Arrêter l'entraînement
                if (watchId) navigator.geolocation.clearWatch(watchId);
                document.getElementById('status').textContent = "Entraînement arrêté.";
                this.textContent = "Démarrer l'entraînement";
                this.classList.remove('btn-danger');
                this.classList.add('btn-primary');
                document.getElementById('nextWaypoint').disabled = true;
                isTrainingStarted = false;
                isRaceStarted = false;
            }
        });

        // Passer au waypoint suivant manuellement
        document.getElementById('nextWaypoint').addEventListener('click', function() {
            if (currentWaypointIndex < measuredWaypoints.length - 1) {
                currentWaypointIndex++;
                displayWaypointInfo();
                document.getElementById('status').textContent =
                    `Waypoint ${currentWaypointIndex + 1} sélectionné manuellement.`;
            } else {
                document.getElementById('status').textContent = "Tous les waypoints ont été atteints !";
            }
        });

        // Mettre à jour la position
        function updatePosition(position) {
            const { latitude, longitude, accuracy } = position.coords;
            const userPos = { lat: latitude, lon: longitude };

            document.getElementById('positionInfo').innerHTML = `
                <strong>Position actuelle :</strong> ${latitude.toFixed(6)}, ${longitude.toFixed(6)}<br>
                <strong>Précision :</strong> ±${accuracy.toFixed(0)} m<br>
                ${getWaypointDistanceInfo(userPos)}
            `;

            if (!userMarker) {
                userMarker = L.marker([latitude, longitude], {
                    icon: L.divIcon({
                        className: 'user-marker',
                        html: `<div style="background-color: green; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold;">📍</div>`
                    })
                }).addTo(map);
            } else {
                userMarker.setLatLng([latitude, longitude]);
            }

            if (currentWaypointIndex < measuredWaypoints.length && isTrainingStarted) {
                const waypoint = measuredWaypoints[currentWaypointIndex];
                const distance = calculateDistance(latitude, longitude, waypoint.lat, waypoint.lon);

                if (distance <= (accuracy * 2)) {
                    if (currentWaypointIndex === 0 && !isRaceStarted) {
                        // Waypoint Départ : remise à zéro du chronomètre
                        startTime = new Date().getTime();
                        isRaceStarted = true;
                        document.getElementById('status').textContent = "Départ détecté ! Chronomètre démarré.";
                    } else if (isRaceStarted) {
                        const currentTime = new Date().getTime();
                        const elapsedTime = (currentTime - startTime) / 1000;
                        const timeDiff = (elapsedTime - waypoint.timeOffset).toFixed(1);

                        waypointHistory.unshift({
                            name: waypoint.name,
                            elapsedTime: elapsedTime,
                            timeOffset: waypoint.timeOffset,
                            timeDiff: parseFloat(timeDiff)
                        });
                        updateHistoryDisplay();

                        document.getElementById('status').innerHTML = `
                            <strong>Waypoint atteint : ${waypoint.name} !</strong><br>
                            Temps écoulé : ${formatTime(elapsedTime)}<br>
                            Temps de référence : ${formatTime(waypoint.timeOffset)}<br>
                            Différence : <span class="time-diff ${
                                timeDiff >= 0 ? 'behind' : 'ahead'
                            }">${timeDiff >= 0 ? `+${timeDiff}s (retard)` : `${Math.abs(timeDiff)}s (avance)`}</span>
                        `;
                        currentWaypointIndex++;
                        displayWaypointInfo();
                    }
                }
            }
            map.setView([latitude, longitude], 17);
        }

        // Retourne les infos sur le prochain waypoint et la distance
        function getWaypointDistanceInfo(userPos) {
            if (currentWaypointIndex >= measuredWaypoints.length) {
                return `<strong>Prochain waypoint :</strong> Aucun<br><strong>Distance restante :</strong> - m`;
            }
            const waypoint = measuredWaypoints[currentWaypointIndex];
            const distance = calculateDistance(userPos.lat, userPos.lon, waypoint.lat, waypoint.lon);
            return `
                <strong>Prochain waypoint :</strong> ${waypoint.name} (${waypoint.lat.toFixed(6)}, ${waypoint.lon.toFixed(6)})<br>
                <strong>Distance restante :</strong> ${distance.toFixed(1)} m
            `;
        }

        // Mettre à jour l'affichage de l'historique
        function updateHistoryDisplay() {
            const historyElement = document.getElementById('history');
            if (waypointHistory.length === 0) {
                historyElement.innerHTML = `
                    <h3>Historique des waypoints</h3>
                    <p>Aucun waypoint atteint pour l'instant.</p>
                `;
                return;
            }

            const filteredHistory = waypointHistory.filter((_, index) =>
                index < waypointHistory.length
            );

            let tableRows = filteredHistory.map((entry, index) => {
                const displayIndex = filteredHistory.length - index;
                const diffClass = entry.timeDiff >= 0 ? 'behind' : 'ahead';
                const diffText = entry.timeDiff >= 0
                    ? `+${entry.timeDiff.toFixed(1)}s`
                    : `${Math.abs(entry.timeDiff).toFixed(1)}s`;
                return `
                    <tr>
                        <td>${displayIndex}</td>
                        <td>${entry.name}</td>
                        <td>${formatTime(entry.elapsedTime)}</td>
                        <td>${formatTime(entry.timeOffset)}</td>
                        <td class="time-diff ${diffClass}">${diffText}</td>
                    </tr>
                `;
            }).join('');

            historyElement.innerHTML = `
                <h3>Historique des waypoints</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nom</th>
                            <th>Temps réel</th>
                            <th>Temps référence</th>
                            <th>Écart</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
            `;
        }

        // Gérer les erreurs de géolocalisation
        function handleGeolocationError(error) {
            let message;
            switch(error.code) {
                case error.PERMISSION_DENIED: message = "Accès GPS refusé. Vérifie les permissions."; break;
                case error.POSITION_UNAVAILABLE: message = "Position indisponible."; break;
                case error.TIMEOUT: message = "Délai GPS expiré."; break;
                default: message = "Erreur GPS inconnue.";
            }
            document.getElementById('status').textContent = message;
            document.getElementById('positionInfo').innerHTML = `
                <strong>Position actuelle :</strong> Indisponible<br>
                <strong>Erreur :</strong> ${message}
            `;
        }

        // Calculer la distance 2D entre deux points GPS
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Initialisation
        window.onload = function() {
            initMap();
        };
    </script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
</body>
</html>
