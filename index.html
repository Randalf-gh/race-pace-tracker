<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi d'entraînement de course</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #map {
            height: 300px;
            width: 100%;
            margin: 20px 0;
        }
        #status, #positionInfo, #waypointInfo, #history {
            font-size: 1.1em;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
            background-color: #f0f0f0;
        }
        #waypointInfo {
            background-color: #e6f7ff;
        }
        #history {
            background-color: #fff8e6;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        .time-diff {
            font-weight: bold;
        }
        .ahead {
            color: green;
        }
        .behind {
            color: red;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            cursor: pointer;
        }
        #gpxFile {
            margin: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Suivi d'entraînement de course</h1>

    <div>
        <input type="file" id="gpxFile" accept=".gpx" />
        <button id="startTraining">Démarrer l'entraînement</button>
        <button id="stopTraining" disabled>Arrêter l'entraînement</button>
        <button id="nextWaypoint" disabled>Passer au waypoint suivant</button>
    </div>

    <div id="status">Charge un fichier GPX pour commencer.</div>

    <div id="positionInfo">
        <strong>Position actuelle :</strong> Non disponible<br>
        <strong>Prochain waypoint :</strong> Aucun<br>
        <strong>Distance restante :</strong> - m
    </div>

    <div id="waypointInfo">Aucun waypoint chargé.</div>

    <div id="history">
        <h3>Historique des waypoints</h3>
        <p>Aucun waypoint atteint pour l'instant.</p>
    </div>

    <div id="map"></div>

    <script>
        // Variables globales
        let watchId;
        let waypoints = [];
        let currentWaypointIndex = 0;
        let startTime;
        let map;
        let userMarker;
        let waypointMarkers = [];
        let waypointHistory = [];

        // Initialisation de la carte (Leaflet)
        function initMap() {
            map = L.map('map').setView([46.5, 6.6], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        // Charger le fichier GPX
        document.getElementById('gpxFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const gpxData = e.target.result;
                waypoints = parseGPX(gpxData);
                if (waypoints.length > 0) {
                    document.getElementById('status').textContent = `Fichier GPX chargé : ${waypoints.length} waypoints détectés.`;
                    document.getElementById('startTraining').disabled = false;
                    displayWaypointInfo();
                    plotWaypointsOnMap();
                    waypointHistory = [];
                    updateHistoryDisplay();
                } else {
                    document.getElementById('status').textContent = "Aucun waypoint valide trouvé dans le fichier GPX.";
                }
            };
            reader.readAsText(file);
        });

        // Parser le fichier GPX
        function parseGPX(gpxData) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(gpxData, "text/xml");
            const wpts = xmlDoc.getElementsByTagName("wpt");
            const waypoints = [];

            for (let i = 0; i < wpts.length; i++) {
                const wpt = wpts[i];
                const lat = parseFloat(wpt.getAttribute("lat"));
                const lon = parseFloat(wpt.getAttribute("lon"));
                const name = wpt.getElementsByTagName("name")[0]?.textContent || `Waypoint ${i+1}`;

                let timeOffset = 0;
                const extensions = wpt.getElementsByTagName("extensions")[0];
                if (extensions) {
                    const timeOffsetElement = extensions.getElementsByTagName("timeOffset")[0];
                    if (timeOffsetElement) {
                        timeOffset = parseInt(timeOffsetElement.textContent) || 0;
                    }
                }

                if (lat && lon) {
                    waypoints.push({ lat, lon, name, timeOffset });
                }
            }

            return waypoints;
        }

        // Afficher les infos du waypoint actuel
        function displayWaypointInfo() {
            if (currentWaypointIndex >= waypoints.length) {
                document.getElementById('waypointInfo').textContent = "Tous les waypoints ont été atteints !";
                return;
            }

            const waypoint = waypoints[currentWaypointIndex];
            document.getElementById('waypointInfo').innerHTML = `
                <strong>Waypoint actuel :</strong> ${waypoint.name}<br>
                <strong>Position :</strong> ${waypoint.lat.toFixed(6)}, ${waypoint.lon.toFixed(6)}<br>
                <strong>Temps de référence :</strong> ${formatTime(waypoint.timeOffset)}
            `;
        }

        // Mettre à jour l'affichage de l'historique
        function updateHistoryDisplay() {
            const historyElement = document.getElementById('history');
            if (waypointHistory.length === 0) {
                historyElement.innerHTML = `
                    <h3>Historique des waypoints</h3>
                    <p>Aucun waypoint atteint pour l'instant.</p>
                `;
                return;
            }

            let tableRows = waypointHistory.map((entry, index) => {
                const diffClass = entry.timeDiff >= 0 ? 'behind' : 'ahead';
                const diffText = entry.timeDiff >= 0
                    ? `+${entry.timeDiff.toFixed(1)}s`
                    : `${entry.timeDiff.toFixed(1)}s`;
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${entry.name}</td>
                        <td>${formatTime(entry.elapsedTime)}</td>
                        <td>${formatTime(entry.timeOffset)}</td>
                        <td class="time-diff ${diffClass}">${diffText}</td>
                    </tr>
                `;
            }).join('');

            historyElement.innerHTML = `
                <h3>Historique des waypoints</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nom</th>
                            <th>Temps réel</th>
                            <th>Temps référence</th>
                            <th>Écart</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;
        }

        // Placer les waypoints sur la carte
        function plotWaypointsOnMap() {
            waypointMarkers.forEach(marker => map.removeLayer(marker));
            waypointMarkers = [];

            waypoints.forEach((wpt, index) => {
                const marker = L.marker([wpt.lat, wpt.lon], {
                    title: wpt.name,
                    icon: L.divIcon({
                        className: 'waypoint-marker',
                        html: `<div style="background-color: ${index === currentWaypointIndex ? 'red' : (index < currentWaypointIndex ? 'gray' : 'blue')}; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold;">${index + 1}</div>`
                    })
                }).addTo(map);
                waypointMarkers.push(marker);
            });

            if (waypoints.length > 0) {
                map.fitBounds(waypoints.map(wpt => [wpt.lat, wpt.lon]));
            }
        }

        // Démarrer l'entraînement
        document.getElementById('startTraining').addEventListener('click', function() {
            if (waypoints.length === 0) {
                alert("Aucun waypoint chargé !");
                return;
            }

            startTime = new Date().getTime();
            document.getElementById('status').textContent = "Entraînement en cours...";
            document.getElementById('startTraining').disabled = true;
            document.getElementById('stopTraining').disabled = false;
            document.getElementById('nextWaypoint').disabled = false;
            waypointHistory = [];
            updateHistoryDisplay();

            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    updatePosition,
                    handleGeolocationError,
                    {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 3000
                    }
                );
            } else {
                document.getElementById('status').textContent = "La géolocalisation n'est pas supportée par ce navigateur.";
            }
        });

        // Arrêter l'entraînement
        document.getElementById('stopTraining').addEventListener('click', function() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            document.getElementById('status').textContent = "Entraînement arrêté.";
            document.getElementById('startTraining').disabled = false;
            document.getElementById('stopTraining').disabled = true;
            document.getElementById('nextWaypoint').disabled = true;
        });

        // Passer au waypoint suivant manuellement
        document.getElementById('nextWaypoint').addEventListener('click', function() {
            if (currentWaypointIndex < waypoints.length - 1) {
                currentWaypointIndex++;
                displayWaypointInfo();
                plotWaypointsOnMap();
                document.getElementById('status').textContent = `Waypoint ${currentWaypointIndex + 1} sélectionné manuellement.`;
            } else {
                document.getElementById('status').textContent = "Tous les waypoints ont été atteints !";
            }
        });

        // Mettre à jour la position
        function updatePosition(position) {
            const { latitude, longitude, accuracy } = position.coords;
            const userPos = { lat: latitude, lon: longitude };

            // Mettre à jour l'affichage de la position actuelle
            document.getElementById('positionInfo').innerHTML = `
                <strong>Position actuelle :</strong> ${latitude.toFixed(6)}, ${longitude.toFixed(6)}<br>
                <strong>Précision :</strong> ±${accuracy.toFixed(0)} m<br>
                ${getWaypointDistanceInfo(userPos)}
            `;

            // Mettre à jour la carte
            if (!userMarker) {
                userMarker = L.marker([latitude, longitude], {
                    icon: L.divIcon({
                        className: 'user-marker',
                        html: `<div style="background-color: green; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold;">📍</div>`
                    })
                }).addTo(map);
            } else {
                userMarker.setLatLng([latitude, longitude]);
            }

            // Vérifier si on est proche d'un waypoint
            if (currentWaypointIndex < waypoints.length) {
                const waypoint = waypoints[currentWaypointIndex];
                const distance = calculateDistance(latitude, longitude, waypoint.lat, waypoint.lon);

                // Marge de tolérance : 15 mètres
                if (distance <= 15) {
                    const currentTime = new Date().getTime();
                    const elapsedTime = (currentTime - startTime) / 1000; // en secondes

                    const timeDiff = (elapsedTime - waypoint.timeOffset).toFixed(1);

                    // Enregistrer dans l'historique
                    waypointHistory.push({
                        name: waypoint.name,
                        elapsedTime: elapsedTime,
                        timeOffset: waypoint.timeOffset,
                        timeDiff: parseFloat(timeDiff)
                    });
                    updateHistoryDisplay();

                    document.getElementById('status').innerHTML = `
                        <strong>Waypoint atteint : ${waypoint.name} !</strong><br>
                        Temps écoulé : ${formatTime(elapsedTime)}<br>
                        Temps de référence : ${formatTime(waypoint.timeOffset)}<br>
                        Différence : <span class="time-diff ${timeDiff >= 0 ? 'behind' : 'ahead'}">${timeDiff >= 0 ? `+${timeDiff}s (retard)` : `${timeDiff}s (avance)`}</span>
                    `;

                    currentWaypointIndex++;
                    displayWaypointInfo();
                    plotWaypointsOnMap();
                }
            }

            // Centrer la carte sur l'utilisateur
            map.setView([latitude, longitude], 17);
        }

        // Retourne les infos sur le prochain waypoint et la distance
        function getWaypointDistanceInfo(userPos) {
            if (currentWaypointIndex >= waypoints.length) {
                return `<strong>Prochain waypoint :</strong> Aucun<br><strong>Distance restante :</strong> - m`;
            }

            const waypoint = waypoints[currentWaypointIndex];
            const distance = calculateDistance(userPos.lat, userPos.lon, waypoint.lat, waypoint.lon);

            return `
                <strong>Prochain waypoint :</strong> ${waypoint.name} (${waypoint.lat.toFixed(6)}, ${waypoint.lon.toFixed(6)})<br>
                <strong>Distance restante :</strong> ${distance.toFixed(1)} m
            `;
        }

        // Gérer les erreurs de géolocalisation
        function handleGeolocationError(error) {
            let message;
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = "L'accès à la géolocalisation a été refusé. Vérifie les permissions.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = "Impossible de récupérer la position.";
                    break;
                case error.TIMEOUT:
                    message = "Le délai pour obtenir la position a expiré (vérifie ta connexion GPS).";
                    break;
                default:
                    message = "Une erreur inconnue est survenue.";
            }
            document.getElementById('status').textContent = message;
            document.getElementById('positionInfo').innerHTML = `
                <strong>Position actuelle :</strong> Indisponible<br>
                <strong>Erreur :</strong> ${message}
            `;
        }

        // Calculer la distance entre deux points GPS (en mètres)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Rayon de la Terre en mètres
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        // Formater les secondes en "mm:ss"
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins} min ${secs.toString().padStart(2, '0')} s`;
        }

        // Initialisation au chargement de la page
        window.onload = function() {
            initMap();
        };
    </script>

    <!-- Intégration de Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
</body>
</html>
